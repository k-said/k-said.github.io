<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Degradation Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#1e293b;padding:8px 18px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #334155;flex-shrink:0}
#topbar h1{font-size:1.05rem;font-weight:700;color:#38bdf8;white-space:nowrap}
.tog-btn{background:#334155;border:none;color:#94a3b8;padding:4px 10px;border-radius:4px;font-size:.72rem;cursor:pointer;transition:all .15s}
.tog-btn.active{background:#0369a1;color:#fff}
#colorbar-wrap{display:flex;align-items:center;gap:6px;font-size:.72rem;color:#94a3b8}
#colorbar{width:140px;height:10px;border-radius:4px}
#colorbar-lo{min-width:52px;text-align:right}
#colorbar-hi{min-width:52px}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:220px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0}
#sidebar-header{padding:8px 12px;border-bottom:1px solid #334155;display:flex;flex-direction:column;gap:6px}
#sidebar-title{font-size:.75rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
#sidebar-controls{display:flex;gap:4px}
#sidebar-controls .tog-btn{font-size:.65rem;padding:3px 7px}
#field-list{overflow-y:auto;flex:1}
.field-class-badge{font-size:.55rem;padding:1px 5px;border-radius:9px;margin-left:auto;flex-shrink:0;font-weight:600}
.class-group-header{padding:6px 12px;font-size:.68rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #334155;background:#0f172a}
.field-item{display:flex;align-items:center;gap:7px;padding:7px 12px;cursor:pointer;border-bottom:1px solid #1e293b;transition:background .15s}
.field-item:hover{background:#334155}
.field-item.active{background:#0369a1}
.field-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.field-name{font-size:.8rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.field-slope{font-size:.7rem;color:#94a3b8;flex-shrink:0}
#content{flex:1;display:flex;flex-direction:column;overflow:hidden}
#farm-map{flex:0 0 50%;border-bottom:1px solid #334155;cursor:crosshair}
#detail{flex:1;display:flex;overflow:hidden;background:#0f172a}
#detail-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#475569;font-size:.9rem}
/* ── 3-column bottom panel ── */
#detail-inner{display:none;grid-template-columns:1fr 1fr 1.2fr;gap:0;flex:1;overflow:hidden}
#detail-inner.visible{display:grid}
/* LLM panel (left) */
#llm-panel{padding:12px 14px;overflow-y:auto;border-right:1px solid #334155}
#llm-title{font-size:.82rem;font-weight:700;color:#38bdf8;margin-bottom:6px}
#llm-classification{margin-bottom:8px}
.llm-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.65rem;font-weight:600;margin-right:4px}
#llm-text{font-size:.78rem;line-height:1.5;color:#cbd5e1}
#llm-overall{margin-top:10px;padding-top:8px;border-top:1px solid #334155;font-size:.72rem;color:#94a3b8;line-height:1.4}
/* Stats panel (middle) */
#stats-panel{padding:12px 14px;overflow-y:auto;border-right:1px solid #334155;display:flex;flex-direction:column;gap:8px}
#detail-header{display:flex;align-items:baseline;gap:10px;flex-shrink:0}
#detail-title{font-size:.95rem;font-weight:700;color:#38bdf8}
#cluster-hint{font-size:.7rem;color:#64748b}
#field-summary{display:flex;gap:14px;flex-wrap:wrap;flex-shrink:0;padding:8px 10px;background:#1e293b;border-radius:6px;border:1px solid #334155}
.fs-item{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.fs-label{font-size:.58rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.fs-value{font-size:.84rem;font-weight:700}
.fs-bar-wrap{height:4px;width:70px;background:#334155;border-radius:2px;overflow:hidden}
.fs-bar-fill{height:100%;border-radius:2px}
#seasons-label{font-size:.72rem;color:#94a3b8;flex-shrink:0}
#cluster-legend{display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0}
.cl-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:.7rem;cursor:pointer;border:2px solid transparent;transition:all .15s;user-select:none}
.cl-chip.dim{opacity:.2}
.cl-chip.selected{border-color:#fff;opacity:1!important}
#stats-table-wrap{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.73rem}
th{background:#1e293b;color:#94a3b8;padding:4px 8px;text-align:right;position:sticky;top:0;z-index:1}
th:first-child{text-align:left}
td{padding:3px 8px;text-align:right;border-top:1px solid #1e293b;cursor:pointer}
td:first-child{text-align:left}
tr.table-row:hover{background:#334155}
tr.table-row.row-selected{background:#0c4a6e}
.badge{display:inline-block;padding:1px 6px;border-radius:9px;font-size:.65rem;font-weight:600}
/* Performance panel (right) */
#ndvi-panel{padding:12px 14px;display:flex;flex-direction:column;gap:6px;overflow:hidden}
#ndvi-title{font-size:.82rem;font-weight:700;color:#38bdf8;flex-shrink:0}
#ndvi-chart-wrap{flex:1;position:relative;min-height:0}
/* Language toggle */
#lang-toggle{display:inline-flex;gap:2px;margin-left:8px}
#lang-toggle .tog-btn{font-size:.6rem;padding:2px 6px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
.leaflet-tooltip{background:#1e293b;border:1px solid #334155;color:#e2e8f0;font-size:.78rem;padding:4px 8px}
</style>
</head>
<body>

<div id="topbar">
  <h1>🌾 Farm Degradation Dashboard</h1>
  <span style="font-size:.72rem;color:#64748b;flex-shrink:0">degradation degree · click field to inspect</span>
  <div style="flex:1"></div>
  <div style="display:flex;gap:4px;flex-shrink:0">
    <button class="tog-btn active" id="btn-sat" onclick="toggleFarmSat()">🛰 Satellite</button>
    <button class="tog-btn active" id="btn-cl" onclick="toggleFarmClusters()">clusters</button>
    <button class="tog-btn active" id="btn-cmode-cluster" onclick="setColorMode('cluster')">by Cluster</button>
    <button class="tog-btn" id="btn-cmode-field" onclick="setColorMode('field')">by Field</button>
  </div>
  <div id="colorbar-wrap">
    <span id="colorbar-lo"></span>
    <div id="colorbar"></div>
    <span id="colorbar-hi"></span>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-title">Fields</div>
      <div id="sidebar-controls">
        <button class="tog-btn active" id="btn-sort-deg" onclick="setSidebarMode('deg')">Degradation</button>
        <button class="tog-btn" id="btn-sort-class" onclick="setSidebarMode('class')">LLM Class</button>
      </div>
    </div>
    <div id="field-list"></div>
  </div>
  <div id="content">
    <div id="farm-map"></div>
    <div id="detail">
      <div id="detail-empty">
        <div id="farm-summary-panel" style="padding:18px 24px;max-width:700px;text-align:left">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <span style="font-size:.88rem;font-weight:700;color:#38bdf8">Farm Overview — LLM Analysis</span>
            <span id="lang-toggle-farm"><button class="tog-btn active" id="btn-lang-en-farm" onclick="setLang('en')">EN</button><button class="tog-btn" id="btn-lang-es-farm" onclick="setLang('es')">ES</button></span>
          </div>
          <div id="farm-overall-text" style="font-size:.8rem;line-height:1.6;color:#cbd5e1"></div>
        </div>
      </div>
      <div id="detail-inner">
        <div id="llm-panel">
          <div style="display:flex;align-items:center;gap:6px">
            <span id="llm-title" style="font-size:.82rem;font-weight:700;color:#38bdf8">LLM Analysis</span>
            <span id="lang-toggle"><button class="tog-btn active" id="btn-lang-en" onclick="setLang('en')">EN</button><button class="tog-btn" id="btn-lang-es" onclick="setLang('es')">ES</button></span>
          </div>
          <div id="llm-classification" style="margin:6px 0"></div>
          <div id="llm-text"></div>
          <div id="llm-overall"></div>
        </div>
        <div id="stats-panel">
          <div id="detail-header">
            <div id="detail-title"></div>
            <div id="cluster-hint">click cluster chip or map polygon</div>
          </div>
          <div id="field-summary"></div>
          <div id="seasons-label"></div>
          <div id="cluster-legend"></div>
          <div id="stats-table-wrap">
            <table id="stats-table">
              <thead><tr>
                <th>Cluster</th>
                <th>ha</th><th>%</th>
                <th>Degradation</th>
              </tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
        <div id="ndvi-panel">
          <div id="ndvi-title">Performance Time Series</div>
          <div id="ndvi-chart-wrap"><canvas id="ts-chart"></canvas></div>
        </div>
      </div>
    </div>
  </div>
</div>

arios campos exhiben degradaci\u00f3n significativa (>0.1 grado de degradaci\u00f3n) incluyendo DR12N_1, DR26ES, DR15N, DR25N, y DR19L. Los patrones comunes de degradaci\u00f3n sugieren problemas potenciales con fertilidad del suelo, manejo del agua, o presi\u00f3n de plagas. Muchos campos permanecen estables (rango 0.0-0.05), indicando problemas localizados m\u00e1s que sist\u00e9micos. Mejoras notables son raras, con solo DR9L mostrando degradaci\u00f3n negativa. Patrones extra\u00f1os incluyen DR54B con datos de una sola temporada y DRRioN con cobertura temporal insuficiente. La tendencia general indica necesidad de intervenci\u00f3n dirigida en \u00e1reas degradadas mientras se mantienen pr\u00e1cticas actuales en zonas estables.","field_summaries_spanish":{"DR10B":"Degradaci\u00f3n moderada (0.069) principalmente impulsada por cluster_2 (0.141) y cluster_3 (0.170). Estos clusters representan 33.9% del \u00e1rea del campo. El rendimiento muestra tendencias decrecientes de NDVI durante 5 temporadas, particularmente en \u00e1reas centrales del campo. Clusters estables (1,4,5,6,7) mantienen productividad. Posibles causas incluyen agotamiento localizado de nutrientes o estr\u00e9s h\u00eddrico en zonas afectadas.","DR10N":"Degradaci\u00f3n leve (0.082) con cluster_2 (0.221) y cluster_4 (0.350) mostrando la mayor declinaci\u00f3n durante 10 temporadas. Cluster_4 cubre 14.8% del campo y muestra patr\u00f3n severo de degradaci\u00f3n. La mayor\u00eda del \u00e1rea del campo permanece estable. El patr\u00f3n de degradaci\u00f3n sugiere problemas localizados de suelo o drenaje en zonas espec\u00edficas que requieren manejo dirigido.","DR11":"Campo estable (0.003) con preocupaciones m\u00ednimas de degradaci\u00f3n durante 12 temporadas. Cluster_5 muestra degradaci\u00f3n moderada (0.344) pero cubre solo 23% del \u00e1rea del campo. La mayor\u00eda de clusters mantienen rendimiento consistente. Algunos clusters muestran ligera mejora con valores negativos de degradaci\u00f3n. El manejo general del campo parece efectivo con atenci\u00f3n localizada necesaria.","DR12N":"Baja degradaci\u00f3n (0.034) con cluster_5 mostrando declinaci\u00f3n significativa (0.332) durante 11 temporadas. Este cluster problem\u00e1tico cubre solo 11.3% del \u00e1rea del campo. La mayor\u00eda del campo permanece estable con rendimiento NDVI consistente. Se necesita intervenci\u00f3n dirigida en el \u00e1rea del cluster_5, posiblemente abordando drenaje o problemas de compactaci\u00f3n del suelo.","DR12N_1":"Degradaci\u00f3n significativa (0.132) afectando m\u00faltiples clusters durante 13 temporadas. Clusters 1, 2, y 5 muestran degradaci\u00f3n de 0.189-0.239, cubriendo 67.2% del \u00e1rea del campo. Este patr\u00f3n extendido de degradaci\u00f3n sugiere problemas sist\u00e9micos como declive de fertilidad del suelo, presi\u00f3n de plagas, o problemas de manejo del agua que requieren revisi\u00f3n integral del manejo del campo.","DR12S":"Baja degradaci\u00f3n (0.042) con cluster_2 (0.186) y cluster_5 (0.126) mostrando declive durante 11 temporadas. Estos clusters cubren 30.8% del \u00e1rea del campo. La mayor\u00eda del \u00e1rea del campo permanece estable. El patr\u00f3n sugiere problemas localizados en lugar de problemas de todo el campo. Se recomienda manejo dirigido de las zonas afectadas.","DR14":"Baja degradaci\u00f3n (0.038) con cluster_3 mostrando declive leve (0.107) durante 10 temporadas. Este cluster cubre solo 5.8% del \u00e1rea del campo. El rendimiento general del campo permanece estable con la mayor\u00eda de clusters manteniendo productividad consistente. Se requiere intervenci\u00f3n m\u00ednima con enfoque en monitoreo del cluster_3.","DR14B":"Degradaci\u00f3n m\u00ednima (0.015) durante 7 temporadas. Cluster_1 muestra ligero declive (0.053) pero cubre solo 13.8% del \u00e1rea del campo. El campo muestra estabilidad general con la mayor\u00eda de clusters manteniendo rendimiento. Este campo peque\u00f1o parece bien manejado sin preocupaciones significativas que requieran atenci\u00f3n inmediata.","DR15B":"Degradaci\u00f3n moderada (0.092) durante 4 temporadas con clusters 1, 6, y 7 mostrando declive. Cluster_7 muestra la degradaci\u00f3n m\u00e1s fuerte (0.372) cubriendo 12.4% del \u00e1rea del campo. Los datos temporales limitados hacen desafiante la evaluaci\u00f3n de tendencias, pero los patrones actuales sugieren necesidad de monitoreo e intervenci\u00f3n potencial en zonas afectadas.","DR15N":"Degradaci\u00f3n moderada (0.048) con cluster_7 mostrando declive severo (0.327) durante 11 temporadas. Cluster_7 cubre 13.1% del \u00e1rea del campo. Clusters adicionales (1, 2, 5) muestran degradaci\u00f3n leve. El patr\u00f3n sugiere m\u00faltiples factores de estr\u00e9s afectando diferentes zonas del campo que requieren enfoque integral de manejo.","DR15S":"Baja degradaci\u00f3n (0.041) con cluster_2 mostrando declive significativo (0.222) durante 13 temporadas. Este cluster cubre 13.6% del \u00e1rea del campo. La mayor\u00eda del campo permanece estable con cluster_5 mostrando degradaci\u00f3n menor (0.040). Se necesita intervenci\u00f3n dirigida en cluster_2 con monitoreo continuo del cluster_5.","DR16":"Baja degradaci\u00f3n (0.029) con clusters 1, 6, y 7 mostrando declive leve durante 12 temporadas. Estos clusters cubren 51.9% del \u00e1rea del campo pero los valores de degradaci\u00f3n permanecen bajos (0.091-0.120). El campo muestra estabilidad general con atenci\u00f3n localizada necesaria para las zonas afectadas.","DR17":"Degradaci\u00f3n moderada (0.088) con clusters 2, 5, y 6 mostrando declive durante 13 temporadas. Cluster_6 muestra la degradaci\u00f3n m\u00e1s fuerte (0.271) cubriendo 26% del \u00e1rea del campo. M\u00faltiples zonas afectadas sugieren necesidad de evaluaci\u00f3n integral del campo y estrategias de manejo dirigidas.","DR17O":"Degradaci\u00f3n m\u00ednima (0.020) con clusters 4 y 6 mostrando declive leve durante 13 temporadas. Estos clusters cubren 25.9% del \u00e1rea del campo. La mayor\u00eda del campo permanece estable con valores de degradaci\u00f3n permaneciendo bajos. Se recomienda monitoreo pero no se requiere intervenci\u00f3n inmediata.","DR18B":"Degradaci\u00f3n m\u00ednima (0.012) con solo cluster_3 mostrando declive significativo (0.313) durante 10 temporadas. Este cluster cubre solo 9.1% del \u00e1rea del campo. El resto del campo permanece estable. Problema localizado que requiere investigaci\u00f3n dirigida, posiblemente relacionado con drenaje o condiciones del suelo.","DR18L":"Baja degradaci\u00f3n (0.017) con clusters 4 y 6 mostrando declive durante 13 temporadas. Cluster_6 cubre solo 5.1% pero muestra degradaci\u00f3n fuerte (0.207). Cluster_4 cubre 6.3% con patr\u00f3n similar. La mayor\u00eda del \u00e1rea del campo permanece estable requiriendo solo atenci\u00f3n localizada.","DR19L":"Alta degradaci\u00f3n (0.177) afectando m\u00faltiples clusters durante 12 temporadas. Clusters 1, 3, 5, y 6 muestran declive significativo con cluster_5 mostrando degradaci\u00f3n severa (0.326). Estos clusters cubren 51.3% del \u00e1rea del campo. La degradaci\u00f3n extendida indica problemas serios de manejo que requieren intervenci\u00f3n integral inmediata.","DR2":"Degradaci\u00f3n m\u00ednima (0.020) con cluster_6 mostrando el declive m\u00e1s fuerte (0.393) durante 12 temporadas. Este cluster cubre 33.7% del \u00e1rea del campo pero muestra patr\u00f3n extremo de degradaci\u00f3n. La mayor\u00eda de otros clusters permanecen estables. Se necesita intervenci\u00f3n dirigida en cluster_6 con investigaci\u00f3n de causas subyacentes.","DR20":"Degradaci\u00f3n moderada (0.067) con clusters 3 y 6 mostrando declive durante 12 temporadas. Cluster_3 cubre 30.7% mostrando degradaci\u00f3n moderada (0.158). El campo muestra rendimiento mixto con la mayor\u00eda del \u00e1rea permaneciendo estable. Se recomienda manejo dirigido de las zonas afectadas.","DR20L":"Baja degradaci\u00f3n (0.039) con cluster_3 mostrando declive leve (0.159) durante 11 temporadas. Este cluster cubre 25.1% del \u00e1rea del campo. La mayor\u00eda del campo permanece estable con rendimiento consistente. Se recomienda monitoreo del cluster_3 pero no se requiere intervenci\u00f3n inmediata.","DR21ES":"Degradaci\u00f3n moderada (0.065) con clusters 1, 5, y 6 mostrando declive durante 11 temporadas. Cluster_1 muestra la degradaci\u00f3n m\u00e1s fuerte (0.295) cubriendo 7.8% del \u00e1rea del campo. M\u00faltiples zonas afectadas sugieren necesidad de evaluaci\u00f3n integral del campo y revisi\u00f3n de la estrategia de manejo.","DR22":"Degradaci\u00f3n moderada (0.066) con clusters 1, 4, y 7 mostrando declive durante 11 temporadas. Cluster_4 muestra la degradaci\u00f3n m\u00e1s fuerte (0.436) cubriendo 34.2% del \u00e1rea del campo. El \u00e1rea grande afectada indica desaf\u00edo significativo de manejo que requiere intervenci\u00f3n integral inmediata.","DR23":"Baja degradaci\u00f3n (0.024) con clusters 3 y 5 mostrando declive durante 12 temporadas. Estos clusters cubren 18.6% del \u00e1rea del campo con valores moderados de degradaci\u00f3n (0.181-0.223). La mayor\u00eda del campo permanece estable requiriendo atenci\u00f3n dirigida en zonas afectadas.","DR23BAJO":"Degradaci\u00f3n moderada (0.079) con clusters 1, 2, y 6 mostrando declive durante 11 temporadas. Estos clusters cubren 49.7% del \u00e1rea del campo con cluster_1 mostrando la degradaci\u00f3n m\u00e1s fuerte (0.206). Porci\u00f3n significativa del campo afectada requiere revisi\u00f3n integral del manejo.","DR24":"Campo estable (-0.005) mostrando ligera mejora general. Solo cluster_2 muestra degradaci\u00f3n menor (0.024) durante 12 temporadas cubriendo 9.2% del \u00e1rea del campo. Cluster_4 muestra mejora (-0.116). Excelente rendimiento del campo con pr\u00e1cticas de manejo efectivas que podr\u00edan servir como modelo para otros campos.","DR25N":"Degradaci\u00f3n significativa (0.163) afectando m\u00faltiples clusters durante 14 temporadas. Clusters 3, 4, 5, y 7 muestran degradaci\u00f3n fuerte con cluster_4 mostrando declive severo (0.330). Estos clusters cubren 69.2% del \u00e1rea del campo. La degradaci\u00f3n extendida requiere intervenci\u00f3n integral inmediata y renovaci\u00f3n de la estrategia de manejo.","DR25NMT":"Campo estable (0.001) con preocupaciones m\u00ednimas de degradaci\u00f3n durante 12 temporadas. Solo cluster_2 muestra degradaci\u00f3n leve (0.098) cubriendo 10% del \u00e1rea del campo. La mayor\u00eda de clusters permanecen estables con algunos mostrando mejora. Campo bien manejado sirviendo como buen ejemplo de pr\u00e1cticas efectivas.","DR26":"Baja degradaci\u00f3n (0.046) con cluster_5 mostrando declive significativo (0.324) durante 12 temporadas. Este cluster cubre 37.5% del \u00e1rea del campo representando preocupaci\u00f3n mayor. Otros clusters permanecen estables. El \u00e1rea grande afectada requiere intervenci\u00f3n dirigida e investigaci\u00f3n de causas subyacentes.","DR26ES":"Degradaci\u00f3n significativa (0.142) con clusters 1, 2, y 3 mostrando declive durante 10 temporadas. Estos clusters cubren 27.6% del \u00e1rea del campo con cluster_2 mostrando la degradaci\u00f3n m\u00e1s fuerte (0.321). M\u00faltiples zonas afectadas indican necesidad de revisi\u00f3n integral del manejo del campo e intervenciones dirigidas.","DR27":"Degradaci\u00f3n moderada (0.052) con clusters 3, 4, y 6 mostrando declive durante 13 temporadas. Estos clusters cubren 43.4% del \u00e1rea del campo con cluster_4 mostrando la degradaci\u00f3n m\u00e1s fuerte (0.086). Porci\u00f3n significativa del campo afectada requiere evaluaci\u00f3n integral del manejo.","DR28":"Campo estable (0.000) sin preocupaciones significativas de degradaci\u00f3n durante 12 temporadas. La mayor\u00eda de clusters mantienen rendimiento consistente con solo fluctuaciones menores. Excelente manejo del campo sirviendo como modelo para pr\u00e1cticas efectivas. Se recomienda monitoreo continuo para mantener niveles actuales de rendimiento.","DR29":"Baja degradaci\u00f3n (0.004) con clusters 5 y 6 mostrando declive m\u00ednimo durante 11 temporadas. Estos clusters cubren 12.1% del \u00e1rea del campo. La mayor\u00eda del campo permanece estable con excelente rendimiento. Se requiere intervenci\u00f3n m\u00ednima con monitoreo continuo de las zonas afectadas.","DR29B":"Degradaci\u00f3n significativa (0.135) durante 5 temporadas con clusters 1, 2, y 3 mostrando declive. Los datos temporales limitados hacen desafiante la evaluaci\u00f3n integral, pero los patrones actuales indican necesidad de atenci\u00f3n inmediata e intervenci\u00f3n de manejo en zonas afectadas.","DR29CAB":"Campo estable (0.000) sin preocupaciones significativas de degradaci\u00f3n durante 12 temporadas. Todos los clusters mantienen rendimiento consistente sin patrones de degradaci\u00f3n identificados. Excelente manejo del campo con pr\u00e1cticas efectivas que deber\u00edan continuarse y potencialmente aplicarse a otros campos.","DR29MT":"Degradaci\u00f3n m\u00ednima (0.010) con solo cluster_3 mostrando declive (0.241) durante 11 temporadas. Este cluster cubre 11.5% del \u00e1rea del campo. La mayor\u00eda del campo permanece estable con excelente rendimiento. Se necesita atenci\u00f3n dirigida solo para cluster_3 con monitoreo continuo.","DR3":"Baja degradaci\u00f3n (0.035) con clusters 1 y 5 mostrando declive leve durante 10 temporadas. Estos clusters cubren 35.1% del \u00e1rea del campo. La mayor\u00eda del campo permanece estable con valores de degradaci\u00f3n permaneciendo bajos. Se recomienda monitoreo con intervenci\u00f3n dirigida potencial si las tendencias contin\u00faan.","DR31":"Baja degradaci\u00f3n (0.039) con clusters 3, 4, y 5 mostrando declive durante 12 temporadas. Estos clusters cubren 67.2% del \u00e1rea del campo con cluster_5 mostrando la degradaci\u00f3n m\u00e1s fuerte (0.058). Porci\u00f3n moderada del campo afectada requiere atenci\u00f3n de manejo dirigida.","DR32":"Baja degradaci\u00f3n (0.047) con clusters 2 y 4 mostrando declive durante 12 temporadas. Estos clusters cubren 35.2% del \u00e1rea del campo con valores leves de degradaci\u00f3n (0.091-0.093). La mayor\u00eda del campo permanece estable requiriendo atenci\u00f3n dirigida en zonas afectadas.","DR33":"Degradaci\u00f3n moderada (0.057) con clusters 1 y 2 mostrando declive durante 11 temporadas. Estos clusters cubren 12.9% del \u00e1rea del campo con cluster_2 mostrando la degradaci\u00f3n m\u00e1s fuerte (0.162). La mayor\u00eda del campo permanece estable requiriendo intervenci\u00f3n dirigida en zonas afectadas.","DR34B":"Degradaci\u00f3n moderada (0.086) durante 4 temporadas con clusters 2 y 7 mostrando declive. Los datos temporales limitados hacen desafiante la evaluaci\u00f3n de tendencias. Cluster_2 muestra degradaci\u00f3n significativa (0.297) cubriendo 23.6% del \u00e1rea del campo. Se recomienda monitoreo e intervenci\u00f3n potencial.","DR34N":"Alta degradaci\u00f3n (0.102) afectando m\u00faltiples clusters durante 16 temporadas. Clusters 1, 2, 4, y 7 muestran degradaci\u00f3n con cluster_1 mostrando el declive m\u00e1s fuerte (0.245). Estos clusters cubren 63.4% del \u00e1rea del campo. La degradaci\u00f3n extendida requiere intervenci\u00f3n integral del manejo.","DR35N":"Baja degradaci\u00f3n (0.027) con cluster_7 mostrando declive significativo (0.408) durante 10 temporadas. Este cluster cubre solo 8.3% del \u00e1rea del campo pero muestra patr\u00f3n severo de degradaci\u00f3n. La mayor\u00eda del campo permanece estable requiriendo investigaci\u00f3n dirigida e intervenci\u00f3n en cluster_7.","DR35SO":"Degradaci\u00f3n moderada (0.093) con m\u00faltiples clusters mostrando declive durante 12 temporadas. Clusters 1, 3, 4, y 6 muestran degradaci\u00f3n cubriendo 74.6% del \u00e1rea del campo. La degradaci\u00f3n extendida indica problemas serios de manejo que requieren intervenci\u00f3n integral inmediata.","DR36":"Baja degradaci\u00f3n (0.044) con clusters 1, 6, y 7 mostr const DEG_MIN            = -0.11153;
const DEG_MAX            = 0.33219;
const FIELD_DEG_MIN      = -0.20971195730941997;
const FIELD_DEG_MAX      = 0.4385217915737745;

// ── colour helpers ────────────────────────────────────────────────────────────
function clusterColor(cid) { return PALETTE[parseInt(cid) % PALETTE.length]; }

function degToRgb(deg) {
  // high degradation = red (end of RDYLGN), low = green (start)
  let t = (deg - DEG_MIN) / (DEG_MAX - DEG_MIN);
  t = Math.max(0, Math.min(1, t));
  t = 1 - t;  // invert: 0=red(high deg), 1=green(low deg)
  const n = RDYLGN.length - 1;
  const lo = Math.floor(t * n), hi = Math.min(lo + 1, n);
  const f  = t * n - lo;
  const a  = RDYLGN[lo], b = RDYLGN[hi];
  return [
    Math.round(a[0] + f*(b[0]-a[0])),
    Math.round(a[1] + f*(b[1]-a[1])),
    Math.round(a[2] + f*(b[2]-a[2])),
  ];
}

const GN_RD = [[0,68,27],[0,104,55],[26,152,80],[102,189,99],[180,220,120],[253,174,97],[244,109,67],[215,48,39],[165,15,21],[103,0,13]];
function fieldDegToRgb(deg, lo, hi) {
  let t = (deg - lo) / (hi - lo);
  t = Math.max(0, Math.min(1, t));
  const n = GN_RD.length - 1;
  const lo2 = Math.floor(t*n), hi2 = Math.min(lo2+1,n), f = t*n-lo2;
  const a=GN_RD[lo2], b=GN_RD[hi2];
  return [Math.round(a[0]+f*(b[0]-a[0])),Math.round(a[1]+f*(b[1]-a[1])),Math.round(a[2]+f*(b[2]-a[2]))];
}
function rgbToHex(rgb) { return '#'+rgb.map(x=>x.toString(16).padStart(2,'0')).join(''); }
function degToHex(deg) { return rgbToHex(degToRgb(deg)); }

function setSidebarMode(mode) {
  _sidebarMode = mode;
  document.getElementById('btn-sort-deg').classList.toggle('active', mode==='deg');
  document.getElementById('btn-sort-class').classList.toggle('active', mode==='class');
  rebuildFieldList();
}

function rebuildFieldList() {
  listEl.innerHTML = '';
  if (_sidebarMode === 'deg') {
    SORTED_FIELDS.forEach(field => listEl.appendChild(makeFieldItem(field)));
  } else {
    // group by LLM classification
    const order = ['degraded_fields','extreme_trends','strange_patterns','stable_fields','improved_fields'];
    const classif = LLM_DATA.classifications || {};
    const shown = new Set();
    order.forEach(key => {
      const fields = classif[key] || [];
      if (!fields.length) return;
      const [color, labelEn, labelEs] = CLASS_COLORS[key];
      const hdr = document.createElement('div');
      hdr.className = 'class-group-header';
      hdr.style.color = color;
      hdr.textContent = _lang==='es' ? labelEs : labelEn;
      listEl.appendChild(hdr);
      fields.sort().forEach(f => {
        if (!FIELDS_DATA[f]) return;
        listEl.appendChild(makeFieldItem(f));
        shown.add(f);
      });
    });
    // any unclassified
    SORTED_FIELDS.filter(f => !shown.has(f)).forEach(f => listEl.appendChild(makeFieldItem(f)));
  }
  // re-highlight active
  if (activeField) {
    const el = document.getElementById(`fi-${activeField}`);
    if (el) el.classList.add('active');
  }
}

function makeFieldItem(field) {
  const fd  = FIELDS_DATA[field];
  const md  = fd.max_deg;
  const dotColor = rgbToHex(fieldDegToRgb(md ?? FIELD_DEG_MIN, FIELD_DEG_MIN, FIELD_DEG_MAX));
  const div = document.createElement('div');
  div.className = 'field-item';
  div.id = `fi-${field}`;
  const fc = _fieldClass[field];
  let badge = '';
  if (fc && _sidebarMode === 'deg') {
    badge = `<span class="field-class-badge" style="background:${fc.color}22;color:${fc.color}">${fc.labelEn.slice(0,3)}</span>`;
  }
  div.innerHTML = `<div class="field-dot" style="background:${dotColor}"></div>
    <span class="field-name">${field}</span>
    <span class="field-slope">${md != null ? md.toFixed(3) : '—'}</span>${badge}`;
  div.addEventListener('click', () => selectField(field));
  return div;
}

function buildFarmClusterLayer(gj) {
  _farmGjData = gj;  // cache for re-coloring on mode switch
  if (farmClusterLayer) { farmClusterLayer.remove(); farmClusterLayer = null; }
  farmClusterLayer = L.geoJSON(gj, {
    style: feat => {
      const val = _colorMode === 'field' ? (feat.properties.field_deg ?? DEG_MIN) : (feat.properties.deg ?? DEG_MIN);
      const rgb = degToRgb(val);
      return {
        color: 'rgba(255,255,255,0.25)', weight: 0.4,
        fillColor: rgbToHex(rgb), fillOpacity: 0.78
      };
    },
    onEachFeature(feat, lyr) {
      const field = feat.properties.field;
      const cid   = feat.properties.cluster;
      const deg   = feat.properties.deg;
      const fdeg  = feat.properties.field_deg;
      const tip = `<b>${field}</b> · cluster ${cid}`
        + `<br>cluster deg: <b>${deg!=null ? deg.toFixed(4) : 'N/A'}</b>`
        + `<br>field deg: <b>${fdeg!=null ? fdeg.toFixed(4) : 'N/A'}</b>`;
      lyr.bindTooltip(tip, {sticky:true});
      lyr.on('click', e => { L.DomEvent.stopPropagation(e); selectField(field); });
    }
  }).addTo(farmMap);
  Object.values(boundaryLayers).forEach(l => l.bringToFront());
}

      + `<br>max cluster deg: ${md!=null?md.toFixed(4):'N/A'}`
      + `<br>min cluster deg: ${mn!=null?mn.toFixed(4):'N/A'}`
      + `<br>area: ${(fd.area_ha||0)} ha · ${fd.seasons.length} seasons`;
    const lyr = L.geoJSON(fd.boundary, {
      style:{color:'#fff', weight:1.8, fillOpacity:0.0, opacity:0.7}
    }).addTo(farmMap);
    lyr.on('click', e => { L.DomEvent.stopPropagation(e); selectField(field); });
    lyr.bindTooltip(tip, {sticky:true});
    boundaryLayers[field] = lyr;
  } catch(e) { console.warn('boundaryLayer error', field, e); }
});

try { farmMap.fitBounds(L.featureGroup(Object.values(boundaryLayers)).getBounds(), {padding:[20,20]}); }
catch(e) {}

// load cluster polygons for farm overview
fetch('farm.gj.json').then(r => r.json()).then(buildFarmClusterLayer)
  .catch(e => console.warn('farm.gj.json not found:', e));

// initialise colorbar (green=low degradation → red=high degradation)
document.getElementById('colorbar').style.background =
  'linear-gradient(to right,#00441b,#1a9641,#a6d96a,#ffffbf,#fdae61,#f46d43,#d73027,#67000d)';
document.getElementById('colorbar-lo').textContent = DEG_MIN.toFixed(3);
document.getElementById('colorbar-hi').textContent = DEG_MAX.toFixed(3);

function loadFieldPts(field) {
  if (_ptsCache[field]) return Promise.resolve(_ptsCache[field]);
  return fetch(`pts/${field}.pts.json`)
    .then(r => r.json())
    .then(gj => { _ptsCache[field] = gj; return gj; })
    .catch(e => { console.error('pts fetch error', field, e); return null; });
}

// ── select field ──────────────────────────────────────────────────────────────
function selectField(field) {
  activeField = field;
  activeCluster = null;

  document.querySelectorAll('.field-item').forEach(el => el.classList.remove('active'));
  const li = document.getElementById(`fi-${field}`);
  if (li) { li.classList.add('active'); li.scrollIntoView({block:'nearest'}); }

  // highlight boundary
  Object.entries(boundaryLayers).forEach(([f, lyr]) => {
    lyr.setStyle({weight: f===field ? 3 : 1.2, opacity: f===field ? 1 : .5});
    if (f===field) lyr.bringToFront();
  });

  // zoom to field
  const bl = boundaryLayers[field] || Object.values(boundaryLayers)[0];
  if (bl) farmMap.fitBounds(bl.getBounds(), {padding:[40,40], maxZoom:16});

  // show detail cluster layer on farm map
  loadFieldPts(field).then(gj => showFieldClusters(gj, field));

  // show bottom panels
  document.getElementById('detail-empty').style.display = 'none';
  document.getElementById('detail-inner').classList.add('visible');

  const fd = FIELDS_DATA[field];
  populateLlmPanel(field);
  populateStats(field, fd);
  populateNdviChart(field, fd);
}

// ── show field clusters on main map ───────────────────────────────────────────
function showFieldClusters(gj, field) {
  if (fieldClusterLayer) { fieldClusterLayer.remove(); fieldClusterLayer = null; }
  if (!gj || !_farmClOn) return;
  const fd = FIELDS_DATA[field];
  fieldClusterLayer = L.geoJSON(gj, {
    style: feat => {
      const cid = feat.properties.cluster;
      const col = cid != null ? clusterColor(cid) : '#888';
      return {color:'#fff', weight:0.8, fillColor:col, fillOpacity:0.85};
    },
    onEachFeature(feat, lyr) {
      const cid = feat.properties.cluster;
      if (cid == null) return;
      const cv = fd.clusters[cid] ?? {};
      lyr.bindTooltip(
        `<b>Cluster ${cid}</b><br>degradation: ${cv.degradation_degree!=null ? cv.degradation_degree.toFixed(4) : '—'}`,
        {sticky:true});
      lyr.on('click', () => highlightCluster(parseInt(cid), 'map'));
    }
  }).addTo(farmMap);
  // keep boundary on top
  if (boundaryLayers[field]) boundaryLayers[field].bringToFront();
}

// ── LLM panel ─────────────────────────────────────────────────────────────────
function populateLlmPanel(field) {
  const summariesEn = LLM_DATA.field_summaries_english || LLM_DATA.field_summaries || {};
  const summariesEs = LLM_DATA.field_summaries_spanish || {};
  const classif     = LLM_DATA.classifications || {};
  const overallEn   = LLM_DATA.overall_summary_english || LLM_DATA.overall_summary || '';
  const overallEs   = LLM_DATA.overall_summary_spanish || '';

  // classification badge
  const fc = _fieldClass[field];
  let cat = '';
  if (fc) {
    const label = _lang==='es' ? fc.labelEs : fc.labelEn;
    cat = `<span class="llm-badge" style="background:${fc.color}22;color:${fc.color}">${label}</span>`;
  }
  document.getElementById('llm-classification').innerHTML = cat;

  const summaries = _lang==='es' ? summariesEs : summariesEn;
  document.getElementById('llm-text').textContent = summaries[field] || (_lang==='es' ? 'Sin análisis LLM para este campo.' : 'No LLM analysis available for this field.');

  const overall = _lang==='es' ? overallEs : overallEn;
  document.getElementById('llm-overall').innerHTML = overall
    ? `<b>${_lang==='es'?'Resumen de finca':'Farm overview'}:</b> ${overall}` : '';
}

// ── highlight a cluster ───────────────────────────────────────────────────────
function highlightCluster(cid, source) {
  activeCluster = activeCluster === cid ? null : cid;
  const ac = activeCluster;

  // highlight on map
  if (fieldClusterLayer) {
    fieldClusterLayer.eachLayer(lyr => {
      const c = lyr.feature?.properties?.cluster;
      if (c == null) return;
      lyr.setStyle({
        fillOpacity: ac === null || c === ac ? 0.85 : 0.12,
        weight:      ac === null || c === ac ? 0.8  : 0.3,
      });
    });
  }

  document.querySelectorAll('.cl-chip').forEach(el => {
    const id = parseInt(el.dataset.cid);
    el.classList.toggle('dim',      ac !== null && id !== ac);
    el.classList.toggle('selected', ac !== null && id === ac);
  });

  if (tsChart) {
    tsChart.data.datasets.forEach(ds => {
      const cidDs = parseInt(ds.label.replace('C',''));
      if (isNaN(cidDs)) return; // skip field-mean line
      const isActive = ac === null || cidDs === ac;
      ds.borderWidth      = isActive ? (cidDs===ac ? 3.5 : 1.5) : 1;
      ds.borderColor      = isActive ? clusterColor(cidDs) : clusterColor(cidDs)+'44';
      ds.pointRadius      = isActive ? (cidDs===ac ? 5 : 3) : 2;
      ds.backgroundColor  = isActive ? clusterColor(cidDs)+'33' : 'transparent';
    });
    tsChart.update('none');
  }

  document.querySelectorAll('.table-row').forEach(tr => {
    const match = ac !== null && parseInt(tr.dataset.cid) === ac;
    tr.classList.toggle('row-selected', match);
    if (match) tr.scrollIntoView({block:'nearest'});
  });
}

// ── stats panel ───────────────────────────────────────────────────────────────
function populateStats(field, fd) {
  document.getElementById('detail-title').textContent = field;
  // field summary bar
  (function() {
    const md = fd.max_deg, mn = fd.min_deg;
    const nClusters = Object.keys(fd.clusters).length;
    const areaHa = fd.area_ha || 0;
    function fscol(v) { return rgbToHex(fieldDegToRgb(v??FIELD_DEG_MIN, FIELD_DEG_MIN, FIELD_DEG_MAX)); }
    function fspct(v) { return Math.round(100*((v??FIELD_DEG_MIN)-FIELD_DEG_MIN)/(FIELD_DEG_MAX-FIELD_DEG_MIN)); }
    const mdHex = fscol(md), mnHex = fscol(mn);
    document.getElementById('field-summary').innerHTML =
      `<div class="fs-item">`
      + `<span class="fs-label">Max degradation (worst)</span>`
      + `<span class="fs-value" style="color:${mdHex}">${md!=null?md.toFixed(4):'N/A'}</span>`
      + `<div class="fs-bar-wrap"><div class="fs-bar-fill" style="width:${fspct(md)}%;background:${mdHex}"></div></div>`
      + `</div>`
      + `<div class="fs-item">`
      + `<span class="fs-label">Min degradation (best)</span>`
      + `<span class="fs-value" style="color:${mnHex}">${mn!=null?mn.toFixed(4):'N/A'}</span>`
      + `<div class="fs-bar-wrap"><div class="fs-bar-fill" style="width:${fspct(mn)}%;background:${mnHex}"></div></div>`
      + `</div>`
      + `<div class="fs-item"><span class="fs-label">Area (ha)</span><span class="fs-value" style="color:#94a3b8">${areaHa.toLocaleString()}</span></div>`
      + `<div class="fs-item"><span class="fs-label">Clusters</span><span class="fs-value" style="color:#94a3b8">${nClusters}</span></div>`
      + `<div class="fs-item"><span class="fs-label">Seasons</span><span class="fs-value" style="color:#94a3b8">${fd.seasons.length}</span></div>`;
  })();

  document.getElementById('seasons-label').textContent =
    `${fd.seasons.length} seasons · ${fd.seasons[0]?.start?.slice(0,10)} → ${fd.seasons[fd.seasons.length-1]?.end?.slice(0,10)}`;

  // cluster legend chips
  const legEl = document.getElementById('cluster-legend');
  legEl.innerHTML = '';
  const sortedCids = Object.keys(fd.clusters)
    .sort((a,b) => (fd.clusters[b].degradation_degree||0) - (fd.clusters[a].degradation_degree||0));
  sortedCids.forEach(cid => {
    const col  = clusterColor(cid);
    const chip = document.createElement('div');
    chip.className = 'cl-chip';
    chip.dataset.cid = cid;
    chip.style.background = col+'33';
    chip.style.color = col;
    const dg = fd.clusters[cid].degradation_degree;
    chip.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${col};display:inline-block"></span>C${cid} <span style="opacity:.7">${dg!=null ? dg.toFixed(3) : ''}</span>`;
    chip.addEventListener('click', () => highlightCluster(parseInt(cid), 'chip'));
    legEl.appendChild(chip);
  });

  // stats table
  const tbody = document.querySelector('#stats-table tbody');
  tbody.innerHTML = '';
  sortedCids.forEach(cid => {
    const cv = fd.clusters[cid];
    const tr = document.createElement('tr');
    tr.className = 'table-row';
    tr.dataset.cid = cid;
    const col = clusterColor(cid);
    const dg = cv.degradation_degree;
    tr.innerHTML = `
      <td><span class="badge" style="background:${col}33;color:${col}">C${cid}</span></td>
      <td>${cv.area_ha??'—'}</td>
      <td>${cv.area_pct!=null ? cv.area_pct.toFixed(1)+'%' : '—'}</td>
      <td style="color:${(dg??0)>0.02?'#f87171':'#86efac'}">${dg!=null ? dg.toFixed(4) : '—'}</td>`;
    tr.addEventListener('click', () => highlightCluster(parseInt(cid), 'table'));
    tbody.appendChild(tr);
  });
}

// ── NDVI time series chart (separate panel) ───────────────────────────────────
function populateNdviChart(field, fd) {
  const seasons = fd.seasons;
  const labels  = seasons.map((s,i) => `${new Date(s.start).getFullYear()} S${i+1}`);

  // per-cluster datasets
  const clusterDatasets = Object.entries(fd.clusters).map(([cid, cv]) => ({
    label: `C${cid}`,
    data: cv.mean,
    borderColor: clusterColor(cid),
    backgroundColor: clusterColor(cid)+'33',
    tension: 0.35,
    pointRadius: 3,
    borderWidth: 2,
  }));
  // field mean NDVI reference
  const fieldNdvi = seasons.map(s => parseFloat(s.mean_ndvi));
  const refDataset = {
    label: 'FIELD Average NDVI',
    data: fieldNdvi,
    borderColor: '#94a3b8',
    borderDash: [4,3],
    borderWidth: 1.5,
    pointRadius: 2,
    backgroundColor: 'transparent',
    tension: 0.3,
  };
  const datasets = [...clusterDatasets, refDataset];

  // season bands plugin
  const seasonBandPlugin = {
    id: 'seasonBands',
    beforeDraw(chart) {
      const {ctx: c, chartArea: ca, scales} = chart;
      if (!ca || !scales.x) return;
      const n = labels.length;
      for (let i = 0; i < n; i++) {
        const x0 = scales.x.getPixelForValue(i - 0.5);
        const x1 = scales.x.getPixelForValue(i + 0.5);
        c.save();
        c.fillStyle = i%2===0 ? 'rgba(255,255,255,0.03)' : 'rgba(56,189,248,0.05)';
        c.fillRect(x0, ca.top, x1-x0, ca.bottom-ca.top);
        c.fillStyle = '#475569';
        c.font = '9px sans-serif';
        c.textAlign = 'center';
        const yr = new Date(seasons[i].start).getFullYear();
        c.fillText(yr, (x0+x1)/2, ca.top+8);
        c.restore();
      }
    }
  };

  if (tsChart) { tsChart.destroy(); tsChart = null; }
  const ctx = document.getElementById('ts-chart').getContext('2d');
  tsChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    plugins: [seasonBandPlugin],
    options: {
      responsive:true, maintainAspectRatio:false, animation:false,
      interaction:{mode:'index', intersect:false},
      plugins:{
        legend:{
          labels:{color:'#94a3b8',font:{size:9},boxWidth:8},
          onClick:(e,item) => {
            const t = item.text;
            if (t.startsWith('C')) highlightCluster(parseInt(t.replace('C','')), 'legend');
          }
        },
        tooltip:{
          callbacks:{
            title: tips => labels[tips[0].dataIndex] + ' · ' + seasons[tips[0].dataIndex]?.start?.slice(0,10),
            label: tip => ` ${tip.dataset.label}: ${tip.parsed.y?.toFixed(3)??'—'}`,
          }
        },
      },
      scales:{
        x:{ticks:{color:'#94a3b8',font:{size:8}},grid:{color:'#1e293b'}},
        y:{
          min:0, max:1,
          ticks:{color:'#94a3b8',font:{size:9}},
          grid:{color:'#1e293b'},
          title:{display:true,text:'Performance',color:'#64748b',font:{size:9}}
        }
      }
    }
  });
}

// (end of script)
</script>
