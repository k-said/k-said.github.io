<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>DonRemegio — Degradation Mapping</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --syngenta-green: #00843D;
            --syngenta-dark: #005228;
            --syngenta-light: #E8F5EE;
            --bg: #F4F6F8;
            --surface: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --radius: 16px;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--syngenta-green);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .back-link:hover {
            color: var(--syngenta-dark);
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 1.8rem;
            color: var(--syngenta-dark);
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .content {
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
        }

        .content h2 {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .content p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        footer {
            margin-top: 56px;
            font-size: 0.75rem;
            color: #999;
        }
    </style>
</head>

<body>
    <a class="back-link" href="/degradation/">← Back to Farms</a>

    <div class="page-header">
        <h1>🌾 DonRemegio</h1>
        <p>Degradation mapping and monitoring</p>
    </div>

    <div class="content">
        <h2>Degradation Analysis</h2>
        <p>Degradation mapping content for DonRemegio will be displayed here.</p>
    </div>

    <footer>© 2026 Syngenta · All rights reserved</footer>
</body>

</html>
