<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Degradation Mapping — k-said</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --syngenta-green: #00843D;
            --syngenta-dark: #005228;
            --syngenta-light: #E8F5EE;
            --syngenta-accent: #7DC242;
            --bg: #F4F6F8;
            --surface: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 8px;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 1.8rem;
            color: var(--syngenta-dark);
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--syngenta-green);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .back-link:hover {
            color: var(--syngenta-dark);
        }

        .farm-list {
            width: 100%;
            max-width: 700px;
        }

        .farm-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .farm-card:hover {
            transform: translateY(-2px);
            border-color: var(--syngenta-green);
            box-shadow: var(--shadow);
        }

        .farm-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .farm-icon {
            width: 48px;
            height: 48px;
            background: var(--syngenta-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .farm-details h2 {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .farm-details p {
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .farm-arrow {
            font-size: 1.2rem;
            color: var(--syngenta-green);
            font-weight: 700;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 600;
        }

        footer {
            margin-top: 56px;
            font-size: 0.75rem;
            color: #999;
        }
    </style>
</head>

<body>
    <a class="back-link" href="/">← Back to Home</a>

    <div class="page-header">
        <h1>🏜️ Degradation Mapping</h1>
        <p>Select a farm to view degradation analysis and maps</p>
    </div>

    <div class="farm-list">
        <div class="section-label">Farms</div>

        <a class="farm-card" href="DonRemegio/index.html">
            <div class="farm-info">
                <div class="farm-icon">🌾</div>
                <div class="farm-details">
                    <h2>DonRemegio</h2>
                    <p>Degradation monitoring &amp; analysis</p>
                </div>
            </div>
            <div class="farm-arrow">→</div>
        </a>
    </div>

    <footer>This is a prototype test product, © 2026 Syngenta · All rights reserved</footer>
</body>

</html>
